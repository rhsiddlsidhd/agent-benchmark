# _workspace/01_plan.yaml 예시
# 00_request.yaml의 R1: "게시글 목록에 제목 검색 필터 추가" (backend-posts, 계약변경 필요)
# 00_request.yaml의 R3: "차트 다크모드 테마 지원" (frontend-chart, 계약변경 없음)
# (R2는 00-request-example.yaml에서 pending 상태라 여기 plan엔 등장하지 않음)

domains:
  - domain: backend-posts
    contract_change_required: true   # 쿼리파라미터(q) 추가 → API 계약 변경
    source_request_ids: [R1]
    # spec_path: docs/api/backend-posts.md   ← planner는 아직 안 씀. api-spec phase(id:1) 완료 후
    #   오케스트레이터가 api-spec agent의 완료보고에서 실제 경로를 받아 이 자리에 기록함(도메인 레벨)
    phases:
      - id: 1
        name: contract
        agent: api-spec
        depends_on: []
        status: pending

      - id: 2
        name: backend-impl
        agent: backend
        path: api/   # API 노출 요구사항이라 Vercel 서버리스 함수 경로로 매칭(backend/CLAUDE.md는 Convention상 API 작성 금지)
        depends_on: [1]
        status: pending

      - id: 3
        name: frontend-impl
        agent: frontend
        path: src/
        depends_on: [1]   # backend-impl(2) 완료 안 기다림 — api-spec(1) 확정되면 contract-first로 팀모드 병렬 시작
        status: pending

      - id: 4
        name: qa
        agent: qa
        depends_on: [2, 3]   # 이 도메인 impl 둘 다 끝나야 실행 — 다른 도메인 진행상황과 무관 (incremental)
        status: pending

  - domain: frontend-chart
    contract_change_required: false   # 순수 스타일링, API 계약 안 건드림
    source_request_ids: [R3]
    phases:
      - id: 5
        name: frontend-dark-mode
        agent: frontend
        path: src/
        depends_on: []
        status: pending

      - id: 6
        name: qa
        agent: qa
        depends_on: [5]   # contract_change_required가 false여도 backend/frontend phase 있으면 무조건 첨부
        status: pending    # 실제로 검증할 경계면 없으면(순수 색상변경) QA가 실행 시점에 스스로 "검증대상 없음"으로 조기종료
